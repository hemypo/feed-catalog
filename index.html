<div class="make-catalog" data-filter-layout="horizontal" data-make-catalog="full">
  <div class="catalog-wrap">
    
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">Фильтры</span>
      </div>
      <div id="filters-container"></div>
      <div class="sidebar-foot">
        <button class="btn-reset" id="clear-filters" type="button">Сбросить всё</button>
        <button class="btn-apply" id="apply-filters" type="button">Показать результаты</button>
      </div>
    </aside>

    <div class="cards-container" id="cards-container">
      
      <div class="catalog-top-bar">
        <div class="catalog-results" id="catalog-results-count">Загрузка...</div>
        
        <div class="catalog-top-actions">
            <button class="btn-mob-filter" id="mobile-filter-toggle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                Фильтры
            </button>

            <select id="sort-select" class="simple-select">
                <option value="default">Сортировка: По умолчанию</option>
                <option value="price-asc">Сначала дешевле</option>
                <option value="price-desc">Сначала дороже</option>
                <option value="year-desc">Сначала новые</option>
                <option value="year-asc">Сначала старые</option>
                <option value="run-asc">Меньше пробег</option>
                <option value="run-desc">Больше пробег</option>
            </select>
        </div>
      </div>
      
      <div class="car-grid" id="cards-grid"></div>

      <div class="pagination-container" id="pagination-container" style="display: none;">
        <div class="pagination-info">
          <div class="results-count" id="results-count">Показано: 0 автомобилей</div>
          <div class="page-size-selector">
            <label for="page-size">Показывать по:</label>
            <select id="page-size">
              <option value="16" selected>16</option>
              <option value="32">32</option>
              <option value="64">64</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>

  <div id="seo-links-container" style="opacity: 0; height: 1px; width: 1px; overflow: hidden; position: absolute;"></div>

  <div class="mob-overlay" id="mob-overlay"></div>
  <div class="mob-drawer" id="mob-drawer">
    <div class="drawer-top">
      <span class="drawer-title">Фильтры</span>
      <button class="btn-close" id="mob-close" type="button" aria-label="Закрыть">×</button>
    </div>
    <div class="drawer-body" id="mob-drawer-body"></div>
  </div>

  <div id="car-detail-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" aria-label="Закрыть">×</button>

      <div class="modal-left">
        <div class="modal-gallery" id="modalGalleryMain">
          <div class="modal-gallery-track" id="modalGalleryTrack"></div>
          <button class="modal-nav-prev" aria-label="Предыдущее фото">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </button>
          <button class="modal-nav-next" aria-label="Следующее фото">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="modal-counter" id="modalCounter">1 / 1</div>
        </div>
        <div class="modal-thumbs" id="modalThumbs"></div>
      </div>

      <div class="modal-right">
        <div class="modal-right-content">
            <div class="modal-status" id="modalStatus"><span class="status-dot"></span>В наличии</div>
            <h2 class="modal-title" id="modalTitle">Автомобиль</h2>
            <div class="modal-pills" id="modalPills"></div>

            <div class="modal-price-block" id="modalPriceBlock">
              <span class="modal-price" id="modalPrice">Цена по запросу</span>
            </div>

            <div class="modal-credit-block">
              <div class="modal-credit-content">
                <div class="modal-credit-label">В КРЕДИТ ДО 8 ЛЕТ</div>
                <div class="modal-credit-value">от 0 ₽/мес</div>
              </div>
              <a href="#popup:report" style="text-decoration:none;"><button class="modal-calc-btn" type="button">Рассчитать</button></a>
            </div>

            <div class="modal-specs-block">
              <h3 class="modal-section-title">Характеристики</h3>
              <div class="modal-specs-grid" id="modalSpecs"></div>
            </div>

            <div class="modal-description-block" id="modalDescBlock" style="display:none">
              <h3 class="modal-section-title">Описание</h3>
              <div class="modal-description" id="modalDesc"></div>
            </div>
        </div>
        
        <div class="modal-action-bar">
          <a href="#popup:model" class="modal-apply-btn" id="modalApplyBtn">Оставить заявку</a>
          <a href="tel:+70000000000" class="modal-phone-btn" id="modalPhoneBtn" aria-label="Позвонить">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </a>
        </div>

      </div>
    </div>
  </div>

</div>
