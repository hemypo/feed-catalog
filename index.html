<div class="udm-catalog" data-udm-catalog="full">
  <div class="catalog-wrap">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">Фильтры</span>
        <button class="btn-reset" id="clear-filters" type="button">Сбросить всё</button>
      </div>

      <div class="filter-group">
        <label class="filter-label">Автосалон</label>
        <div class="multiselect" id="salon-multiselect">
          <div class="multiselect-trigger" id="salon-trigger">
            <div class="multiselect-selected" id="salon-selected">
              <span class="multiselect-placeholder">Все салоны</span>
            </div>
            <svg class="multiselect-arrow" viewBox="0 0 10 7" fill="none">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="multiselect-dropdown hidden" id="salon-dropdown"></div>
        </div>
      </div>
      <div class="f-sep"></div>

      <div class="filter-group">
        <label class="filter-label">Стоимость, ₽</label>
        <div class="double-range" id="price-range">
          <div class="range-track" id="price-track">
            <div class="range-fill" id="price-fill"></div>
            <div class="thumb" id="price-thumb-min" role="slider" tabindex="0" aria-label="Минимальная цена"></div>
            <div class="thumb" id="price-thumb-max" role="slider" tabindex="0" aria-label="Максимальная цена"></div>
          </div>
        </div>
        <div class="range-row">
          <input type="number" class="f-input" id="price-min-input" placeholder="От">
          <input type="number" class="f-input" id="price-max-input" placeholder="До">
        </div>
      </div>
      <div class="f-sep"></div>

      <div class="filter-group">
        <label class="filter-label">Пробег, км</label>
        <div class="double-range" id="run-range">
          <div class="range-track" id="run-track">
            <div class="range-fill" id="run-fill"></div>
            <div class="thumb" id="run-thumb-min" role="slider" tabindex="0" aria-label="Минимальный пробег"></div>
            <div class="thumb" id="run-thumb-max" role="slider" tabindex="0" aria-label="Максимальный пробег"></div>
          </div>
        </div>
        <div class="range-row">
          <input type="number" class="f-input" id="run-min-input" placeholder="От">
          <input type="number" class="f-input" id="run-max-input" placeholder="До">
        </div>
      </div>
      <div class="f-sep"></div>

      <div class="filter-group">
        <label class="filter-label">Год выпуска</label>
        <div class="range-row">
          <input type="number" class="f-input" id="year-min-input" placeholder="От">
          <input type="number" class="f-input" id="year-max-input" placeholder="До">
        </div>
      </div>
      <div class="f-sep"></div>

      <div class="filter-group">
        <label class="filter-label">Марка</label>
        <div class="multiselect" id="model-multiselect">
          <div class="multiselect-trigger" id="model-trigger">
            <div class="multiselect-selected" id="model-selected">
              <span class="multiselect-placeholder">Любая марка</span>
            </div>
            <svg class="multiselect-arrow" viewBox="0 0 10 7" fill="none">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="multiselect-dropdown hidden" id="model-dropdown"></div>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Коробка передач</label>
        <select class="f-select" id="filter-gearbox"><option value="">Любая коробка</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Тип кузова</label>
        <select class="f-select" id="filter-body"><option value="">Любой кузов</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Тип привода</label>
        <select class="f-select" id="filter-drive"><option value="">Любой привод</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Тип двигателя</label>
        <select class="f-select" id="filter-engine"><option value="">Любой двигатель</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Цвет кузова</label>
        <select class="f-select" id="filter-color"><option value="">Любой цвет</option></select>
      </div>
      <div class="f-sep"></div>

      <div class="filter-group">
        <label class="filter-label">Руль</label>
        <div class="toggle-row" id="filter-wheel">
          <button type="button" class="toggle-opt is-active" data-wheel="all">Все</button>
          <button type="button" class="toggle-opt" data-wheel="left">Левый</button>
          <button type="button" class="toggle-opt" data-wheel="right">Правый</button>
        </div>
      </div>

      <button class="btn-apply" id="apply-filters" type="button">Показать результаты</button>
    </aside>

    <div class="cards-container" id="cards-container">
      <div class="toolbar">
        <button class="btn-mob-filter" id="mobile-filter-toggle" type="button">
          <svg width="15" height="12" fill="none" viewBox="0 0 15 12">
            <path d="M1 1h13M3.5 6h8M6 11h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Фильтры
        </button>
        <div class="search-group">
          <input type="text" id="search" class="search-input" placeholder="Поиск по модели...">
        </div>
        <div class="sort-wrap">
          <span class="sort-label">Сортировка:</span>
          <select id="sort-select" class="sort-select">
            <option value="default">По умолчанию</option>
            <option value="price-asc">Сначала дешевле</option>
            <option value="price-desc">Сначала дороже</option>
          </select>
        </div>
      </div>

      <div class="car-grid" id="cards-grid"></div>

      <div class="pagination-container" id="pagination-container" style="display: none;">
        <div class="pagination-info">
          <div class="results-count" id="results-count">Показано: 0 из 0 автомобилей</div>
          <div class="page-size-selector">
            <label for="page-size">Показывать по:</label>
            <select id="page-size">
              <option value="16">16</option>
              <option value="32">32</option>
              <option value="64">64</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <div id="seo-links-container" style="opacity: 0.1; height: 1px; overflow: hidden;"></div>

  <div class="mob-overlay" id="mob-overlay"></div>
  <div class="mob-drawer" id="mob-drawer">
    <div class="drawer-top">
      <span class="drawer-title">Фильтры</span>
      <button class="btn-close" id="mob-close" type="button" aria-label="Закрыть">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="mob-drawer-body"></div>
  </div>

  <!-- CAR DETAIL MODAL -->
<div id="car-detail-modal" class="modal-overlay hidden">
  <div class="pm-box">
    <button class="pm-close" aria-label="Закрыть">×</button>

    <div class="pm-content">
      <section class="pm-gallery-section" aria-label="Галерея автомобиля">
        <div class="pm-gallery" id="pmGalleryMain">
          <img id="pmMainImg" src="" alt="">
          <button class="pm-nav-prev" aria-label="Предыдущее фото">&#10094;</button>
          <button class="pm-nav-next" aria-label="Следующее фото">&#10095;</button>
          <div class="pm-counter" id="pmCounter">1 / 1</div>
        </div>
        <div class="pm-thumbs" id="pmThumbs"></div>
      </section>

      <section class="pm-info-section" aria-label="Информация об автомобиле">
        <div class="pm-top">
          <div class="pm-status" id="pmStatus"><span class="status-dot"></span>В наличии</div>
          <h2 class="pm-title" id="pmTitle">Автомобиль</h2>
          <div class="pm-subtitle" id="pmSubtitle">
            <span class="pm-vin" id="pmVin"></span>
          </div>
          <div class="pm-pills" id="pmPills"></div>

          <div class="pm-price-block">
            <div class="pm-price-main">
              <span class="pm-price" id="pmPrice">Цена по запросу</span>
              <span class="pm-price-old" id="pmPriceOld"></span>
              <span class="pm-save" id="pmSave"></span>
            </div>
            <div class="pm-credit-block">
              <div class="pm-credit-content">
                <div class="pm-credit-label">ПЛАТЁЖ В КРЕДИТ</div>
                <div class="pm-credit-value"><span id="pmMonthly">Уточняйте</span></div>
              </div>
              <a href="#popup:report"><button class="pm-calc-btn" type="button">Рассчитать</button></a>
            </div>
          </div>
        </div>

        <div class="pm-specs-block">
          <h3 class="pm-section-title">ХАРАКТЕРИСТИКИ</h3>
          <div class="pm-specs-grid" id="pmSpecs"></div>
        </div>

        <div class="pm-description-block" id="pmDescBlock" style="display:none">
          <h3 class="pm-section-title">ОПИСАНИЕ</h3>
          <div class="pm-description" id="pmDesc"></div>
        </div>

        <div class="pm-footer">
          <a href="#popup:model"><button class="pm-apply-btn" id="pmApplyBtn" type="button">Оставить заявку</button></a>
          <a href="tel:+70000000000" class="pm-phone-btn" id="pmPhoneBtn" aria-label="Позвонить">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </a>
        </div>
      </section>
    </div>
  </div>
</div>
</div>
